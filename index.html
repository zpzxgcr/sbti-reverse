<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBTI 反向推导器</title>
<style>
:root {
  --bg: #f6faf6;
  --panel: #ffffff;
  --text: #1e2a22;
  --muted: #6a786f;
  --line: #dbe8dd;
  --soft: #edf6ef;
  --accent: #6c8d71;
  --accent-strong: #4d6a53;
  --shadow: 0 16px 40px rgba(47,73,55,0.08);
  --radius: 22px;
  --red: #d9534f;
  --gold: #c49a1a;
  --green: #4d6a53;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: radial-gradient(circle at top left, #f8fff8 0%, #f6faf6 36%, #f2f7f3 100%);
  color: var(--text);
  min-height: 100vh;
}

.shell {
  max-width: 980px;
  margin: 0 auto;
  padding: 24px 16px 56px;
}

.card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

/* ── Hero ── */
.hero {
  padding: 42px 28px;
  margin-top: 20px;
  overflow: hidden;
  position: relative;
  text-align: center;
  min-height: 36vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.hero::after {
  content: "";
  position: absolute;
  right: -60px; top: -60px;
  width: 180px; height: 180px;
  border-radius: 50%;
  background: linear-gradient(180deg, rgba(127,165,134,0.18), rgba(127,165,134,0.02));
  pointer-events: none;
}

.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--accent-strong);
  border: 1px solid var(--line);
  background: var(--soft);
  border-radius: 999px;
  padding: 8px 14px;
  margin-bottom: 18px;
}

.hero h1 {
  font-size: clamp(26px, 5vw, 46px);
  line-height: 1.12;
  letter-spacing: -0.03em;
}

.hero .sub {
  margin-top: 14px;
  color: var(--muted);
  font-size: 15px;
  line-height: 1.75;
  max-width: 520px;
}

/* ── Type Grid ── */
.type-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 10px;
  margin-top: 28px;
  padding: 0 4px;
}

.type-card {
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 14px 10px;
  background: var(--panel);
  cursor: pointer;
  transition: all .18s ease;
  text-align: center;
}

.type-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(47,73,55,0.1);
}

.type-card.selected {
  border-color: var(--accent-strong);
  background: var(--soft);
  box-shadow: 0 4px 16px rgba(77,106,83,0.14);
}

.type-card .code {
  font-size: 17px;
  font-weight: 800;
  color: var(--accent-strong);
}

.type-card .cn {
  font-size: 12px;
  color: var(--muted);
  margin-top: 3px;
}

.type-card.special .code { color: var(--gold); }
.type-card.special { border-style: dashed; }
.type-card.special.selected {
  border-color: var(--gold);
  background: #fdfbf3;
}

/* ── Result Panel ── */
.result-panel {
  margin-top: 28px;
  display: none;
  animation: fadeUp .3s ease;
}

.result-panel.visible { display: block; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

.result-inner { padding: 24px; }

.result-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 20px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--line);
}

.result-header h2 {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.02em;
}

.tag {
  font-size: 12px;
  color: var(--accent-strong);
  border: 1px solid var(--line);
  background: var(--soft);
  border-radius: 999px;
  padding: 6px 12px;
  font-weight: 700;
}

/* ── Intro Box ── */
.intro-box {
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 18px;
  background: linear-gradient(180deg, #fbfefb, #f3f8f4);
  margin-bottom: 22px;
}

.intro-box .kicker {
  font-size: 12px;
  letter-spacing: .06em;
  color: var(--accent-strong);
  margin-bottom: 6px;
}

.intro-box .intro-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.8;
  font-style: italic;
  opacity: .8;
}

/* ── Charts ── */
.charts-section { margin-bottom: 24px; }

.charts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.chart-box {
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 16px;
  background: linear-gradient(180deg, #ffffff, #fbfdfb);
}

.chart-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--muted);
  margin-bottom: 10px;
  text-align: center;
}

.chart-wrap { width: 100%; }
.chart-wrap svg { width: 100%; height: auto; display: block; }

.chart-legend {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 12px;
  font-size: 13px;
  color: var(--muted);
}

.chart-legend i {
  display: inline-block;
  width: 10px; height: 10px;
  border-radius: 3px;
  margin-right: 5px;
  vertical-align: middle;
}

/* ── Section Heading ── */
.section-head { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
.section-sub { color: var(--muted); font-size: 13px; line-height: 1.7; margin-bottom: 14px; }

/* ── Dim Table ── */
.dim-table-wrap { overflow-x: auto; margin-bottom: 24px; }

.dim-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 14px;
}

.dim-table thead th {
  text-align: left;
  padding: 10px 12px;
  color: var(--muted);
  font-weight: 700;
  font-size: 12px;
  letter-spacing: .04em;
  border-bottom: 2px solid var(--line);
}

.dim-table tbody td {
  padding: 10px 12px;
  border-bottom: 1px solid #eef4ef;
  vertical-align: top;
}

.dim-table tbody tr:last-child td { border-bottom: none; }
.dim-table tbody tr:hover { background: #f4faf5; }

.dim-name { font-weight: 700; color: var(--text); }
.dim-model { color: var(--muted); font-size: 11px; margin-top: 2px; }

.level-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px; height: 24px;
  border-radius: 8px;
  font-weight: 800;
  font-size: 13px;
}

.level-badge.L { background: #fde8e8; color: var(--red); }
.level-badge.M { background: #fdf5e0; color: var(--gold); }
.level-badge.H { background: #e3f2e6; color: var(--green); }

.answer-hint { color: var(--muted); font-size: 13px; }

/* ── Question Cards ── */
.q-card {
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 14px;
  background: linear-gradient(180deg, #ffffff, #fbfdfb);
  margin-bottom: 10px;
}

.q-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px; margin-bottom: 8px;
  flex-wrap: wrap;
}

.q-num { font-size: 12px; color: var(--muted); font-weight: 700; }

.q-dim {
  font-size: 11px;
  color: var(--accent-strong);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 3px 10px;
  background: var(--soft);
  font-weight: 700;
}

.q-text {
  font-size: 14px; line-height: 1.7;
  color: var(--text); margin-bottom: 10px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.q-text.expanded { -webkit-line-clamp: unset; }

.q-expand { color: var(--accent); font-size: 12px; cursor: pointer; margin-bottom: 8px; font-weight: 700; }

.opt-row { display: flex; gap: 8px; flex-wrap: wrap; }

.opt-pill {
  font-size: 13px; padding: 6px 12px;
  border-radius: 10px;
  border: 1px solid var(--line);
  background: #fff; color: var(--muted);
}

.opt-pill.recommended {
  border-color: var(--accent-strong);
  background: var(--soft);
  color: var(--accent-strong);
  font-weight: 700;
}

.opt-pill.acceptable {
  border-color: #e8ddb8;
  background: #fdfbf3;
  color: var(--gold);
  font-weight: 600;
}

/* ── Special Note ── */
.special-note {
  margin-top: 20px;
  border: 1px solid #e8ddb8;
  border-radius: 16px;
  padding: 16px;
  background: #fdfbf3;
  color: #7a6a2a;
  font-size: 14px;
  line-height: 1.8;
}

.special-note strong { display: block; margin-bottom: 4px; color: #5a4e1a; }

/* ── Footer ── */
.footer {
  margin-top: 36px;
  text-align: center;
  padding: 22px 20px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--panel);
  box-shadow: var(--shadow);
}

.footer p {
  color: var(--muted);
  font-size: 13px;
  line-height: 2.2;
}

.copy-link {
  color: var(--accent-strong);
  font-weight: 700;
  text-decoration: underline;
  text-decoration-color: var(--accent);
  text-underline-offset: 3px;
  text-decoration-thickness: 2px;
  cursor: pointer;
  transition: opacity .15s;
}

.copy-link:hover { opacity: .65; }

.copy-toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--accent-strong);
  color: #fff;
  padding: 12px 24px;
  border-radius: 14px;
  font-size: 14px;
  font-weight: 700;
  box-shadow: 0 12px 30px rgba(77,106,83,0.25);
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s, transform .25s;
  z-index: 999;
}

.copy-toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

@media (max-width: 860px) {
  .charts-grid { grid-template-columns: 1fr; }
}

@media (max-width: 600px) {
  .shell { padding: 14px 12px 42px; }
  .type-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .type-card { padding: 12px 8px; }
  .type-card .code { font-size: 14px; }
  .result-inner { padding: 16px; }
  .dim-table { font-size: 12px; }
  .dim-table thead th, .dim-table tbody td { padding: 8px; }
  .hero { padding: 28px 16px; min-height: auto; }
}
</style>
</head>
<body>

<div class="shell">
  <section class="hero card">
    <div class="eyebrow">⟁ REVERSE ENGINE</div>
    <h1>SBTI 反向推导器</h1>
    <p class="sub">选一个你想要的人格类型，系统会告诉你需要怎么答题才能得到它。</p>
    <p class="sub" style="margin-top:10px">关注公众号：<span class="copy-link" onclick="copyText('橘话闲谈')">橘话闲谈</span></p>
  </section>

  <div class="type-grid" id="typeGrid"></div>

  <div class="result-panel" id="resultPanel">
    <div class="card">
      <div class="result-inner">
        <div class="result-header">
          <h2 id="resultTitle">—</h2>
          <span class="tag" id="resultTag">—</span>
        </div>

        <div class="intro-box">
          <div class="kicker">人格语录</div>
          <div class="intro-text" id="introText"></div>
        </div>

        <div class="charts-section" id="chartsSection">
          <div class="charts-grid">
            <div class="chart-box">
              <div class="chart-title">15 维雷达图</div>
              <div class="chart-wrap"><svg id="radarChart" viewBox="0 0 400 400"></svg></div>
            </div>
            <div class="chart-box">
              <div class="chart-title">五大模型得分分布</div>
              <div class="chart-wrap"><svg id="barChart" viewBox="0 0 400 300"></svg></div>
            </div>
          </div>
          <div class="chart-legend">
            <span><i style="background:var(--red)"></i> L (低)</span>
            <span><i style="background:var(--gold)"></i> M (中)</span>

          <div class="dim-table-wrap">
            <table class="dim-table">
              <thead><tr><th>维度</th><th>目标</th><th>得分区间</th><th>答题策略</th></tr></thead>

          </div>
        </div>

        <div>
          <h3 class="section-head">逐题推荐选项</h3>
          <p class="section-sub">绿色为推荐选项，黄色为可接受选项。每个维度 2 题，两题配合才能落入目标区间。</p>
          <div id="questionCards"></div>
        </div>

        <div class="special-note" id="specialNote" style="display:none"></div>
      </div>
    </div>
  </div>

  <div class="footer">
    <p>本工具仅供娱乐研究，基于公开前端代码的逻辑分析</p>
    <p>原测试作者：B站@蛆肉儿串儿</p>
    <p>关注公众号：<span class="copy-link" id="copyWechat">橘话闲谈</span></p>

</div>

<div class="copy-toast" id="copyToast"></div>

<script>
/* ── 复制文本 ── */
function copyText(name) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(name).then(()=>showToast(name)).catch(()=>fallbackCopy(name));
  } else { fallbackCopy(name); }
}
function fallbackCopy(name) {
  const ta = document.createElement('textarea');
  ta.value = name; ta.style.cssText = 'position:fixed;opacity:0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); showToast(name); } catch(e) {}
  document.body.removeChild(ta);
}
function showToast(name) {
  const t = document.getElementById('copyToast');
  t.textContent = '✓ 已复制「' + name + '」';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}
document.getElementById('copyWechat').addEventListener('click', function(){ copyText('橘话闲谈'); });

  {id:'q24',dim:'Ac3',text:'我做事常常有计划，____',options:[{label:'计划不如变化快',value:1},{label:'有时能有时不能',value:2},{label:'讨厌被打破计划',value:3}]},
  {id:'q25',dim:'So1',text:'网友邀请线下见面，你的想法？',options:[{label:'有点忐忑',value:1},{label:'反正聊两句',value:2},{label:'打扮一番热情聊天',value:3}]},
  {id:'q26',dim:'So1',text:'朋友带了ta的朋友来玩，你的状态？',options:[{label:'天然有点距离感',value:1},{label:'看对方能玩就玩',value:2},{label:'朋友的朋友也算朋友！',value:3}]},
  {id:'q27',dim:'So2',text:'我和人相处主打电子围栏，靠太近自动报警',options:[{label:'认同',value:3},{label:'中立',value:2},{label:'不认同',value:1}]},
  {id:'q28',dim:'So2',text:'我渴望和信任的人关系密切',options:[{label:'认同',value:1},{label:'中立',value:2},{label:'不认同',value:3}]},
  {id:'q29',dim:'So3',text:'有不同看法但没说出来，多数原因是？',options:[{label:'这种情况较少',value:1},{label:'碍于情面或关系',value:2},{label:'不想让别人知道自己阴暗',value:3}]},
  {id:'q30',dim:'So3',text:'我在不同人面前表现不一样的自己',options:[{label:'不认同',value:1},{label:'中立',value:2},{label:'认同',value:3}]},
];

const TYPES = [
  {code:"CTRL",cn:"拿捏者",pattern:"HHH-HMH-MHH-HHH-MHM",intro:"怎么样，被我拿捏了吧？"},
  {code:"ATM-er",cn:"送钱者",pattern:"HHH-HHM-HHH-HMH-MHL",intro:"你以为我很有钱吗？"},
  {code:"Dior-s",cn:"屌丝",pattern:"MHM-MMH-MHM-HMH-LHL",intro:"等着我屌丝逆袭。"},
  {code:"BOSS",cn:"领导者",pattern:"HHH-HMH-MMH-HHH-LHL",intro:"方向盘给我，我来开。"},
  {code:"THAN-K",cn:"感恩者",pattern:"MHM-HMM-HHM-MMH-MHL",intro:"我感谢苍天！我感谢大地！"},
  {code:"OH-NO",cn:"哦不人",pattern:"HHL-LMH-LHH-HHM-LHL",intro:"哦不！我怎么会是这个人格？！"},
  {code:"GOGO",cn:"行者",pattern:"HHM-HMH-MMH-HHH-MHM",intro:"gogogo~出发咯"},
  {code:"SEXY",cn:"尤物",pattern:"HMH-HHL-HMM-HMM-HLH",intro:"您就是天生的尤物！"},
  {code:"LOVE-R",cn:"多情者",pattern:"MLH-LHL-HLH-MLM-MLH",intro:"爱意太满，现实显得有点贫瘠。"},
  {code:"MUM",cn:"妈妈",pattern:"MMH-MHL-HMM-LMM-HLL",intro:"或许...我可以叫你妈妈吗....?"},
  {code:"FAKE",cn:"伪人",pattern:"HLM-MML-MLM-MLM-HLH",intro:"已经，没有人类了。"},
  {code:"OJBK",cn:"无所谓人",pattern:"MMH-MMM-HML-LMM-MML",intro:"我说随便，是真的随便。"},
  {code:"MALO",cn:"吗喽",pattern:"MLH-MHM-MLH-MLH-LMH",intro:"人生是个副本，而我只是一只吗喽。"},
  {code:"JOKE-R",cn:"小丑",pattern:"LLH-LHL-LML-LLL-MLM",intro:"原来我们都是小丑。"},
  {code:"WOC!",cn:"握草人",pattern:"HHL-HMH-MMH-HHM-LHH",intro:"卧槽，我怎么是这个人格？"},
  {code:"THIN-K",cn:"思考者",pattern:"HHL-HMH-MLH-MHM-LHH",intro:"已深度思考100s。"},
  {code:"SHIT",cn:"愤世者",pattern:"HHL-HLH-LMM-HHM-LHH",intro:"这个世界，构石一坨。"},
  {code:"ZZZZ",cn:"装死者",pattern:"MHL-MLH-LML-MML-LHM",intro:"我没死，我只是在睡觉。"},
  {code:"POOR",cn:"贫困者",pattern:"HHL-MLH-LMH-HHH-LHL",intro:"我穷，但我很专。"},
  {code:"MONK",cn:"僧人",pattern:"HHL-LLH-LLM-MML-LHM",intro:"没有那种世俗的欲望。"},
  {code:"IMSB",cn:"傻者",pattern:"LLM-LMM-LLL-LLL-MLM",intro:"认真的么？我真的是傻逼么？"},
  {code:"SOLO",cn:"孤儿",pattern:"LML-LLH-LHL-LML-LHM",intro:"我哭了，我怎么会是孤儿？"},
  {code:"FUCK",cn:"草者",pattern:"MLL-LHL-LLM-MLL-HLH",intro:"操！这是什么人格？"},
  {code:"DEAD",cn:"死者",pattern:"LLL-LLM-LML-LLL-LHM",intro:"我，还活着吗？"},
  {code:"IMFW",cn:"废物",pattern:"LLH-LHL-LML-LLL-MLL",intro:"我真的...是废物吗？"},
  {code:"DRUNK",cn:"酒鬼",pattern:null,intro:"烈酒烧喉，不得不醉。",special:true},
  {code:"HHHH",cn:"傻乐者",pattern:null,intro:"哈哈哈哈哈哈。",special:true},
];

const levelRanges={L:'2~3分',M:'4分',H:'5~6分'};
const levelStrategies={L:'两题都尽量选低分（1分），或一题1一题2',M:'两题凑成总分4，比如 1+3 或 2+2',H:'两题都尽量选高分（3分），或一题2一题3'};

function parsePattern(p){return p.replace(/-/g,'').split('');}
const qByDim={};
questions.forEach(q=>{if(!qByDim[q.dim])qByDim[q.dim]=[];qByDim[q.dim].push(q);});
function getRecommendedValues(l){if(l==='L')return[[1,1],[1,2],[2,1]];if(l==='M')return[[1,3],[2,2],[3,1]];return[[2,3],[3,2],[3,3]];}
function getBestCombo(l){if(l==='L')return[1,1];if(l==='M')return[2,2];return[3,3];}

/* ── Build Grid ── */
const grid=document.getElementById('typeGrid');
const panel=document.getElementById('resultPanel');

TYPES.forEach(t=>{
  const el=document.createElement('div');
  el.className='type-card'+(t.special?' special':'');
  el.innerHTML=`<div class="code">${t.code}</div><div class="cn">${t.cn}</div>`;
  el.addEventListener('click',()=>{
    document.querySelectorAll('.type-card').forEach(c=>c.classList.remove('selected'));
    el.classList.add('selected');
    renderResult(t);
    panel.classList.remove('visible');
    void panel.offsetWidth;
    panel.classList.add('visible');
    setTimeout(()=>panel.scrollIntoView({behavior:'smooth',block:'start'}),50);
  });
  grid.appendChild(el);
});

/* ── SVG helper ── */
function svgEl(tag,attrs){
  const e=document.createElementNS('http://www.w3.org/2000/svg',tag);
  for(const[k,v]of Object.entries(attrs))e.setAttribute(k,v);
  return e;
}

/* ── Render ── */
function renderResult(type){
  document.getElementById('resultTitle').textContent=`${type.code}（${type.cn}）`;
  document.getElementById('introText').textContent=type.intro;
  const note=document.getElementById('specialNote');
  const dimBody=document.getElementById('dimBody');
  const qCards=document.getElementById('questionCards');
  const chartsSection=document.getElementById('chartsSection');

  if(type.special){
    document.getElementById('resultTag').textContent='特殊人格';
    dimBody.innerHTML='<tr><td colspan="4" style="color:var(--muted);padding:20px;text-align:center">该人格不通过维度匹配产生</td></tr>';
    chartsSection.style.display='none';
    note.style.display='block';
    if(type.code==='DRUNK'){
      note.innerHTML=`<strong>🍺 触发条件</strong>在特殊题「您平时有什么爱好？」中选择<b>「饮酒」</b>，然后在追加题「您对饮酒的态度是？」中选择<b>「我习惯将白酒灌在保温杯，当白开水喝」</b>。<br>选完这两题后，其他 30 道题随便答——系统会直接跳过常规匹配，100% 判定为 DRUNK。`;
    } else {
      note.innerHTML=`<strong>🎲 触发条件</strong>HHHH 是兜底人格——当所有 25 种标准人格的匹配度都低于 60% 时自动触发。<br>想刻意触发比较难，需要让你的答案向量不靠近任何一种标准模式。一种思路是大量选中间选项（2分），让模式变成全 M，但不保证一定低于 60%。`;
    }
    qCards.innerHTML='';
    return;
  }

  document.getElementById('resultTag').textContent='标准人格';
  note.style.display='none';
  chartsSection.style.display='block';

  const levels=parsePattern(type.pattern);
  const levelMap={};
  dimOrder.forEach((d,i)=>levelMap[d]=levels[i]);

  const lNum={L:1,M:2,H:3};
  const lColor=l=>l==='H'?'#4d6a53':l==='M'?'#c49a1a':'#d9534f';
  const radarData=levels.map(l=>lNum[l]);

  /* ── Radar ── */
  const rSvg=document.getElementById('radarChart');
  rSvg.innerHTML='';
  const cx=200,cy=200,maxR=140,n=15;
  const shortLabels=dimOrder.map(d=>dimensionMeta[d].name.replace(/^[A-Za-z0-9]+ /,''));

  [1,2,3].forEach(ring=>{
    const r=maxR*ring/3;let pts=[];
    for(let i=0;i<n;i++){const a=Math.PI*2*i/n-Math.PI/2;pts.push(`${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`);}
    rSvg.appendChild(svgEl('polygon',{points:pts.join(' '),fill:'none',stroke:'#dbe8dd','stroke-width':ring===3?'1.5':'1'}));
  });

  for(let i=0;i<n;i++){
    const a=Math.PI*2*i/n-Math.PI/2;
    rSvg.appendChild(svgEl('line',{x1:cx,y1:cy,x2:cx+maxR*Math.cos(a),y2:cy+maxR*Math.sin(a),stroke:'#e8f0e9','stroke-width':'1'}));
  }

  ['L','M','H'].forEach((lbl,idx)=>{
    const r=maxR*(idx+1)/3;
    const t=svgEl('text',{x:cx+5,y:cy-r-4,fill:'#9aac9e','font-size':'10','font-weight':'700'});
    t.textContent=lbl;rSvg.appendChild(t);
  });

  let dataPts=[];
  for(let i=0;i<n;i++){const a=Math.PI*2*i/n-Math.PI/2,r=maxR*radarData[i]/3;dataPts.push(`${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`);}
  rSvg.appendChild(svgEl('polygon',{points:dataPts.join(' '),fill:'rgba(77,106,83,0.1)',stroke:'rgba(77,106,83,0.5)','stroke-width':'2'}));

  for(let i=0;i<n;i++){
    const a=Math.PI*2*i/n-Math.PI/2,r=maxR*radarData[i]/3;
    const px=cx+r*Math.cos(a),py=cy+r*Math.sin(a);
    rSvg.appendChild(svgEl('circle',{cx:px,cy:py,r:'5',fill:lColor(levels[i]),stroke:'#fff','stroke-width':'2'}));
    const lr=maxR+26,lx=cx+lr*Math.cos(a),ly=cy+lr*Math.sin(a);
    const t=svgEl('text',{x:lx,y:ly,fill:'#7a917e','font-size':'9','font-weight':'600','text-anchor':'middle','dominant-baseline':'central'});
    t.textContent=shortLabels[i];rSvg.appendChild(t);
  }

  /* ── Bar ── */
  const bSvg=document.getElementById('barChart');
  bSvg.innerHTML='';
  const mg=[{name:'自我',dims:['S1','S2','S3']},{name:'情感',dims:['E1','E2','E3']},{name:'态度',dims:['A1','A2','A3']},{name:'行动',dims:['Ac1','Ac2','Ac3']},{name:'社交',dims:['So1','So2','So3']}];
  const barData=mg.map(g=>{const s=g.dims.reduce((a,d)=>a+lNum[levelMap[d]],0);return Math.round(s/g.dims.length*100)/100;});
  const bP={l:40,r:20,t:15,b:40},bW=400-bP.l-bP.r,bH=300-bP.t-bP.b;

  [0,1,2,3].forEach(v=>{
    const y=bP.t+bH-(v/3)*bH;
    bSvg.appendChild(svgEl('line',{x1:bP.l,x2:bP.l+bW,y1:y,y2:y,stroke:'#dbe8dd','stroke-width':'1'}));
    if(v>0){const t=svgEl('text',{x:bP.l-8,y:y+4,fill:'#9aac9e','font-size':'11','font-weight':'700','text-anchor':'end'});t.textContent=['','L','M','H'][v];bSvg.appendChild(t);}
  });

  const gap=bW/5,barW2=gap*0.55;
  barData.forEach((val,i)=>{
    const x=bP.l+gap*i+(gap-barW2)/2,h=(val/3)*bH,y=bP.t+bH-h;
    const col=val>=2.5?'#4d6a53':val>=1.5?'#c49a1a':'#d9534f';
    const bg=val>=2.5?'rgba(77,106,83,0.12)':val>=1.5?'rgba(196,154,26,0.12)':'rgba(217,83,79,0.12)';
    bSvg.appendChild(svgEl('rect',{x,y,width:barW2,height:h,rx:'6',ry:'6',fill:bg,stroke:col,'stroke-width':'2'}));
    const vt=svgEl('text',{x:x+barW2/2,y:y-8,fill:col,'font-size':'13','font-weight':'800','text-anchor':'middle'});vt.textContent=val.toFixed(1);bSvg.appendChild(vt);
    const xl=svgEl('text',{x:x+barW2/2,y:bP.t+bH+24,fill:'#7a917e','font-size':'13','font-weight':'700','text-anchor':'middle'});xl.textContent=mg[i].name;bSvg.appendChild(xl);
  });

  /* ── Dim Table ── */
  dimBody.innerHTML=dimOrder.map((dim,i)=>{
    const lv=levels[i];
    return `<tr>
      <td><div class="dim-name">${dimensionMeta[dim].name}</div><div class="dim-model">${dimensionMeta[dim].model}</div></td>
      <td><span class="level-badge ${lv}">${lv}</span></td>
      <td class="answer-hint">${levelRanges[lv]}</td>
      <td class="answer-hint">${levelStrategies[lv]}</td>
    </tr>`;
  }).join('');

  /* ── Question Cards ── */
  qCards.innerHTML='';
  dimOrder.forEach(dim=>{
    const lv=levelMap[dim],best=getBestCombo(lv),combos=getRecommendedValues(lv),qs=qByDim[dim]||[];
    qs.forEach((q,qi)=>{
      const rv=best[qi],av=new Set();combos.forEach(c=>av.add(c[qi]));
      const card=document.createElement('div');card.className='q-card';
      card.innerHTML=`
        <div class="q-top">
          <span class="q-num">${q.id.toUpperCase()}</span>
          <span class="q-dim">${dimensionMeta[dim].name} → ${lv}</span>
        </div>
        <div class="q-text" id="qt-${q.id}">${q.text}</div>
        ${q.text.length>60?`<div class="q-expand" onclick="document.getElementById('qt-${q.id}').classList.toggle('expanded');this.textContent=this.textContent==='展开全文'?'收起':'展开全文'">展开全文</div>`:''}
        <div class="opt-row">
          ${q.options.map((opt,oi)=>{
            const code=['A','B','C','D'][oi];
            let cls='';
            if(opt.value===rv)cls='recommended';
            else if(av.has(opt.value))cls='acceptable';
            return `<span class="opt-pill ${cls}" title="${opt.label}">${code}. ${opt.label.slice(0,12)}${opt.label.length>12?'…':''}</span>`;
          }).join('')}
        </div>`;
      qCards.appendChild(card);
    });
  });
}
</script>
